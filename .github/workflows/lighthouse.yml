name: Lighthouse CI
on:
  pull_request:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: pnpm install
      - name: Build
        run: pnpm build --if-present
      - name: Start static server
        run: npx http-server ./build -p 8080 &
      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:8080 >/dev/null; then
              echo "server up"; break
            fi
            sleep 1
          done
      - name: Install lighthouse and jq
        run: sudo npm install -g lighthouse && sudo apt-get update && sudo apt-get install -y jq
      - name: Run Lighthouse
        run: |
          lighthouse http://127.0.0.1:8080 --quiet --output=json --output-path=./lh.json --only-categories=performance,accessibility || true
          PERF=$(jq '.categories.performance.score' lh.json)
          ACC=$(jq '.categories.accessibility.score' lh.json)
          PERF100=$(awk "BEGIN {printf \"%d\", ($PERF*100)}")
          ACC100=$(awk "BEGIN {printf \"%d\", ($ACC*100)}")
          echo "Performance: $PERF100, Accessibility: $ACC100"
          if [ "$PERF100" -lt 95 ] || [ "$ACC100" -lt 95 ]; then
            echo "Lighthouse thresholds not met (required >=95). Failing."; exit 1
          fi
