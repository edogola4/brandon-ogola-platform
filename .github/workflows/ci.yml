name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: pnpm install
      - name: Type-check
        run: pnpm typecheck --if-present
      - name: Lint
        run: pnpm lint --if-present
      - name: Build
        run: pnpm build --if-present
